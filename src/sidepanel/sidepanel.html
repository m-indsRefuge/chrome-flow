<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chrome Flow</title>
  <link rel="stylesheet" href="./sidepanel.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Chrome Flow</h1>
      <p>Local cognitive workspace for browser flow.</p>
    </header>

    <section class="workspace-section">
      <label for="workspaceName">Workspace Name</label>
      <input id="workspaceName" type="text" placeholder="Example: Local LLM Memory Research" />

      <label for="workspaceAim">Aim / Directive</label>
      <textarea id="workspaceAim" rows="3" placeholder="What are you trying to understand or organize?"></textarea>

      <label for="workspaceType">Workspace Type</label>
      <select id="workspaceType"></select>
      <p id="workspaceTypeDescription" class="workspace-type-description"></p>

      <button id="saveWorkspaceButton">Save Workspace</button>
    </section>

    <section class="intake-section">
      <h2>Workspace Intake</h2>
      <p class="section-help">Scan the current Chrome window, select the tabs that belong to this workspace, then add only those selected tabs.</p>

      <button id="scanTabsButton">Scan Current Window Tabs</button>
      <button id="addSelectedTabsButton">Add Selected Tabs to Workspace</button>
      <button id="clearScannedTabsButton" class="secondary-button">Clear Scanned Tabs</button>

      <p id="intakeStatus" class="status-message"></p>
      <div id="availableTabsList"></div>
    </section>

    <section class="tabs-section">
      <h2>Workspace Tabs</h2>
      <p class="section-help">These are the tabs currently included in this Chrome Flow workspace.</p>

      <label for="searchQuery">Open Search Tab</label>
      <input id="searchQuery" type="text" placeholder="Search the web from this workspace..." />
      <button id="openSearchTabButton" class="secondary-button">Open Search Tab</button>

      <button id="createChromeGroupsButton" class="secondary-button">Create Chrome Tab Groups</button>
      <button id="refreshWorkspaceTabsButton" class="secondary-button">Refresh Workspace Tab Metadata</button>
      <button id="clearWorkspaceTabsButton" class="danger-button">Clear Workspace Tabs</button>
      <div id="tabsList"></div>
    </section>

    <section class="journal-section">
      <h2>Journal</h2>
      <textarea id="journalEntry" rows="4" placeholder="Add a note about this research journey..."></textarea>
      <button id="addJournalButton">Add Journal Entry</button>
      <div id="journalList"></div>
    </section>

    <section class="timeline-section">
      <h2>Timeline</h2>
      <div id="timelineList"></div>
    </section>
  </main>

  <script type="module" src="./sidepanel.js"></script>
</body>
</html>
